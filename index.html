<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Main Page</title>
    <link href="./src/output.css" rel="stylesheet">
</head>
    <body class="bg-gray-100 font-sans min-h-screen flex items-center justify-center">
        <div class="w-full max-w-2xl bg-white rounded-2xl shadow-md p-6 space-y-6">
            <!-- Header -->
            <h1 class="text-3xl font-semibold text-center text-gray-800">Mozart</h1>

            <!-- Input -->
            <div>
                <label class="block mb-2 text-sm font-medium text-gray-600">
                    Input
                </label>
                <textarea
                    id="inputText"
                    rows="4"
                    class="w-full p-3 rounded-lg bg-gray-50 border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none"
                    placeholder="Type your message here..."
                ></textarea>
            </div>

            <!-- Controls -->
            <div class="flex items-center justify-between">

                <div class="flex items-center gap-6 flex-wrap">
                
                    <!-- Key Dropdown -->
                    <div class="flex items-center gap-2">
                        <label for="keySelect" class="text-sm font-medium text-gray-700">
                            Key
                        </label>

                        <select
                            id="keySelect"
                            class="p-2 rounded-lg bg-gray-50 border border-gray-300 focus:ring-2 focus:ring-blue-500 focus:outline-none text-sm"
                        >
                            <option value="C">C Major</option>
                            <option value="G">G Major</option>
                            <option value="D">D Major</option>
                            <option value="A">A Major</option>
                            <option value="E">E Major</option>
                            <option value="B">B Major</option>
                            <option value="F#">F# Major</option>
                            <option value="C#">C# Major</option>

                            <option value="F">F Major</option>
                            <option value="Bb">Bb Major</option>
                            <option value="Eb">Eb Major</option>
                            <option value="Ab">Ab Major</option>
                            <option value="Db">Db Major</option>
                            <option value="Gb">Gb Major</option>
                            <option value="Cb">Cb Major</option>
                        </select>
                    </div>

                    <!-- Toggle -->
                    <div class="flex items-center space-x-3 text-gray-700">
                        <span class="text-sm">Encrypt</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                        <input type="checkbox" id="modeToggle" class="sr-only peer">
                        <div class="w-11 h-6 bg-gray-300 rounded-full peer peer-checked:bg-blue-500 transition"></div>
                        <div class="absolute left-1 top-1 w-4 h-4 bg-white rounded-full shadow transition peer-checked:translate-x-5"></div>
                        </label>
                        <span class="text-sm">Decrypt</span>
                    </div>
                </div>

                <!-- Button -->
                <button
                    id="submitBtn"
                    class="bg-blue-500 hover:bg-blue-600 text-white px-5 py-2 rounded-lg font-medium transition flex flex-row gap-2"
                >
                    <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                        <path stroke-linecap="round" stroke-linejoin="round" d="m21 21-5.197-5.197m0 0A7.5 7.5 0 1 0 5.196 5.196a7.5 7.5 0 0 0 10.607 10.607Z" />
                    </svg>
                    Run Cipher
                </button>
            </div>

            <!-- Output -->
            <div>
                <label class="block mb-2 text-sm font-medium text-gray-600">
                    Output
                </label>
                <textarea
                    id="outputText"
                    rows="4"
                    readonly
                    class="w-full p-3 rounded-lg bg-gray-50 border border-gray-300"
                    placeholder="Your result will appear here..."
                ></textarea>
            </div>
        </div>

        <script src="logic.js"></script>
        <script src="app.js"></script>
    </body>
</html>
